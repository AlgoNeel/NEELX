<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEELX PRO | Institutional Grade Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #3b82f6;
            --brand-accent: #6366f1;
            --brand-success: #10b981;
            --brand-danger: #f43f5e;
            --bg-dark: #020617;
            --bg-card: #0f172a;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Premium Glass Effects */
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
        }

        .glass-nav {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
        }

        /* Gradient Text */
        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Professional Inputs */
        input, select, textarea {
            background: rgba(30, 41, 59, 0.5) !important;
            border: 1px solid var(--border-subtle) !important;
            border-radius: 14px !important;
            padding: 14px 18px !important;
            font-size: 14px !important;
            color: white !important;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: var(--brand-primary) !important;
            background: rgba(30, 41, 59, 0.8) !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15) !important;
            outline: none;
        }

        /* Status Animations */
        .dot-pulse {
            position: relative;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--brand-success);
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .drawer-up {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .btn-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .trade-card {
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .trade-card:active {
            transform: scale(0.98);
            background: rgba(30, 41, 59, 0.8);
        }
    </style>
</head>
<body class="antialiased selection:bg-blue-500/30">

    <!-- SETUP OVERLAY (Pro Variant) -->
    <div id="setupOverlay" class="fixed inset-0 bg-[#020617] z-[5000] flex items-center justify-center p-8 hidden">
        <div class="max-w-sm w-full space-y-10 text-center">
            <div class="inline-flex p-5 rounded-[2.5rem] bg-gradient-to-br from-blue-500 to-indigo-600 shadow-2xl shadow-blue-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight mb-3">NEELX <span class="text-blue-500 italic">PRO</span></h1>
                <p class="text-slate-400 text-sm leading-relaxed">Securely connect your proprietary ledger to synchronize institutional-grade analytics.</p>
            </div>
            <form id="setupForm" class="space-y-4">
                <input type="url" id="setupUrl" placeholder="Paste Cloud Sync URL" required class="w-full text-center font-mono placeholder:text-slate-600">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-5 rounded-2xl transition-all shadow-xl shadow-blue-600/20 uppercase tracking-widest text-xs">Initialize Node</button>
            </form>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen relative pb-32">
        <!-- HEADER -->
        <header class="sticky top-0 z-[100] px-6 py-5 flex justify-between items-center bg-[#020617]/80 backdrop-blur-md border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center font-black italic text-xs tracking-tighter">NX</div>
                <span class="font-bold text-sm tracking-tight">NEELX PRO</span>
            </div>
            <div class="flex items-center gap-2.5 px-3 py-1.5 rounded-full bg-white/5 border border-white/10">
                <div id="ui-sync-dot" class="dot-pulse"></div>
                <span id="ui-sync-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">LIVE</span>
            </div>
        </header>

        <!-- DASHBOARD -->
        <main id="view-dashboard" class="px-6 pt-8 space-y-10 animate-in fade-in duration-700">
            <!-- HERO BALANCE -->
            <section class="text-center space-y-2">
                <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">Equity Standing</h4>
                <div class="relative inline-block">
                    <p id="ui-balance" class="text-5xl font-extrabold tracking-tighter font-mono text-gradient">$0.00</p>
                    <div class="absolute -right-4 -top-1 w-2 h-2 bg-blue-500 rounded-full blur-[2px]"></div>
                </div>
            </section>

            <!-- STATS GRID -->
            <section class="grid grid-cols-2 gap-4">
                <div class="glass-card p-5 space-y-1">
                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Net Realized</span>
                    <p id="ui-total-pnl" class="text-xl font-mono font-bold text-emerald-400">$0.00</p>
                </div>
                <div class="glass-card p-5 space-y-1">
                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Strike Rate</span>
                    <p id="ui-winrate" class="text-xl font-mono font-bold text-blue-400">0%</p>
                </div>
            </section>

            <!-- RECENT ACTIVITY -->
            <section class="space-y-5">
                <div class="flex justify-between items-center">
                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Live Ledger</h3>
                    <button onclick="switchView('history')" class="text-blue-500 text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-lg bg-blue-500/10 hover:bg-blue-500/20 transition-colors">Archive</button>
                </div>
                <div id="ui-recent-list" class="space-y-4">
                    <!-- Dynamic Items -->
                </div>
            </section>
        </main>

        <!-- HISTORY VIEW -->
        <main id="view-history" class="hidden px-6 pt-8 pb-10 space-y-6">
            <div class="flex items-center gap-4 mb-2">
                <button onclick="switchView('dashboard')" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <h2 class="text-2xl font-extrabold tracking-tight">Full Archive</h2>
            </div>
            <div id="ui-full-history" class="space-y-4"></div>
        </main>

        <!-- SETTINGS VIEW -->
        <main id="view-sync" class="hidden px-6 pt-8 space-y-6">
            <h2 class="text-2xl font-extrabold tracking-tight mb-8">Node Configuration</h2>
            <div class="glass-card p-6 space-y-8">
                <div class="space-y-3">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Base Liquidity</label>
                    <div class="flex gap-2">
                        <input type="number" id="capitalInput" class="flex-1 font-mono text-center" placeholder="0.00">
                        <button onclick="handleUpdateCapital()" class="bg-blue-600 text-white px-5 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-blue-500 transition-colors">Apply</button>
                    </div>
                </div>
                
                <div class="pt-6 border-t border-white/5 space-y-3">
                    <button onclick="forceSync()" class="w-full bg-white/5 hover:bg-white/10 text-white font-bold py-4 rounded-xl text-[10px] uppercase tracking-widest border border-white/10 transition-all">Request Node Sync</button>
                    <button onclick="resetApp()" class="w-full bg-rose-500/10 hover:bg-rose-500/20 text-rose-500 font-bold py-4 rounded-xl text-[10px] uppercase tracking-widest border border-rose-500/20 transition-all">Purge Session</button>
                </div>
            </div>
        </main>

        <!-- NAV BAR -->
        <nav class="fixed bottom-0 left-0 right-0 h-24 glass-nav z-[1500] flex items-center justify-around px-8 pb-6">
            <button onclick="switchView('dashboard')" id="nav-dashboard" class="flex flex-col items-center gap-1.5 text-blue-500">
                <div class="w-1.5 h-1.5 rounded-full bg-current mb-0.5 opacity-0 nav-dot"></div>
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                <span class="text-[8px] font-black uppercase tracking-[0.2em]">Nodes</span>
            </button>
            <button onclick="switchView('history')" id="nav-history" class="flex flex-col items-center gap-1.5 text-slate-500">
                <div class="w-1.5 h-1.5 rounded-full bg-current mb-0.5 opacity-0 nav-dot"></div>
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
                <span class="text-[8px] font-black uppercase tracking-[0.2em]">Ledger</span>
            </button>
            <button onclick="switchView('sync')" id="nav-sync" class="flex flex-col items-center gap-1.5 text-slate-500">
                <div class="w-1.5 h-1.5 rounded-full bg-current mb-0.5 opacity-0 nav-dot"></div>
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                <span class="text-[8px] font-black uppercase tracking-[0.2em]">Config</span>
            </button>
        </nav>

        <!-- ADD ACTION BUTTON -->
        <button onclick="toggleDrawer(true)" class="fixed bottom-28 right-8 w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-500/40 z-[2000] active:scale-90 transition-all btn-glow">
            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
    </div>

    <!-- LOG TRADE DRAWER -->
    <div id="drawer" class="fixed inset-0 bg-[#020617]/80 backdrop-blur-md z-[3000] hidden flex items-end" onclick="event.target.id === 'drawer' && toggleDrawer(false)">
        <div id="drawerContent" class="w-full bg-slate-900 rounded-t-[3rem] p-8 pb-12 border-t border-white/10 drawer-up translate-y-full shadow-[0_-20px_50px_rgba(0,0,0,0.5)]" onclick="event.stopPropagation()">
            
            <div class="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>
            <h3 class="text-2xl font-bold mb-8 text-center">New Execution</h3>

            <form id="tradeForm" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Asset</label>
                        <select name="pair" required class="w-full bg-slate-800">
                            <option value="EURUSD">EURUSD</option>
                            <option value="GBPUSD">GBPUSD</option>
                            <option value="NAS100">NAS100</option>
                            <option value="XAUUSD">XAUUSD</option>
                            <option value="US30">US30</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Bias</label>
                        <select name="bias" class="w-full">
                            <option value="Buy">Long / Buy</option>
                            <option value="Sell">Short / Sell</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Lot Size</label>
                        <input type="number" step="0.001" name="lots" placeholder="0.00" required class="w-full font-mono">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Risk Amount ($)</label>
                        <input type="number" step="0.01" name="risk" placeholder="0.00" required class="w-full font-mono">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Type</label>
                        <select name="resultType" class="w-full">
                            <option value="Profit">Profit</option>
                            <option value="Loss">Loss</option>
                            <option value="BE">Break-even</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Net PnL ($)</label>
                        <input type="number" step="0.01" name="pnlValue" placeholder="0.00" required class="w-full font-mono">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Trade Setup</label>
                    <input type="text" name="setup" placeholder="e.g. MSS + FVG" class="w-full">
                </div>

                <button type="submit" id="logBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-5 rounded-2xl transition-all shadow-xl shadow-blue-600/20 uppercase tracking-[0.2em] text-xs mt-6">Commit to Ledger</button>
            </form>
        </div>
    </div>

    <script>
        let state = { startingCapital: 0, trades: [], syncUrl: '' };
        let isSyncing = false;

        window.onload = () => {
            const saved = localStorage.getItem('neelx_pro_session');
            if (saved) {
                state = JSON.parse(saved);
                if (state.syncUrl) {
                    hideSetup();
                    forceSync();
                } else { showSetup(); }
            } else { showSetup(); }
            renderApp();
        };

        function showSetup() { document.getElementById('setupOverlay').classList.remove('hidden'); }
        function hideSetup() { document.getElementById('setupOverlay').classList.add('hidden'); }

        function switchView(view) {
            ['dashboard', 'history', 'sync'].forEach(v => {
                const el = document.getElementById(`view-${v}`);
                el.classList.toggle('hidden', v !== view);
                
                const nav = document.getElementById(`nav-${v}`);
                nav.classList.toggle('text-blue-500', v === view);
                nav.classList.toggle('text-slate-500', v !== view);
                
                // Dot indicator visibility
                const dot = nav.querySelector('.nav-dot');
                dot.style.opacity = v === view ? '1' : '0';
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleDrawer(show) {
            const d = document.getElementById('drawer');
            const c = document.getElementById('drawerContent');
            if (show) {
                d.classList.remove('hidden');
                setTimeout(() => c.classList.remove('translate-y-full'), 10);
            } else {
                c.classList.add('translate-y-full');
                setTimeout(() => d.classList.add('hidden'), 500);
            }
        }

        document.getElementById('setupForm').onsubmit = async (e) => {
            e.preventDefault();
            const url = document.getElementById('setupUrl').value.trim();
            state.syncUrl = url;
            const ok = await forceSync();
            if (ok) { hideSetup(); saveState(); }
        };

        async function forceSync() {
            if (!state.syncUrl || isSyncing) return false;
            updateSyncStatus('syncing', 'Syncing...');
            isSyncing = true;
            try {
                const res = await fetch(`${state.syncUrl}?action=fetch`);
                const data = await res.json();
                if (data.result === 'success') {
                    state.trades = data.trades || [];
                    state.startingCapital = parseFloat(data.startingCapital || 0);
                    saveState();
                    renderApp();
                    updateSyncStatus('active', 'Live');
                    return true;
                }
            } catch (e) {
                updateSyncStatus('error', 'Sync Failed');
                return false;
            } finally { isSyncing = false; }
        }

        async function handleUpdateCapital() {
            const val = parseFloat(document.getElementById('capitalInput').value);
            if (isNaN(val)) return;
            state.startingCapital = val;
            saveState();
            renderApp();
            try {
                fetch(state.syncUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'updateCapital', value: val })
                });
            } catch(e) {}
        }

        document.getElementById('tradeForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('logBtn');
            btn.innerHTML = `<span class="animate-pulse">COMMITTING...</span>`;
            btn.disabled = true;

            const fd = new FormData(e.target);
            const trade = {
                id: Date.now(),
                timestamp: new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short'}) + ' ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}),
                pair: fd.get('pair'),
                bias: fd.get('bias'),
                lots: fd.get('lots'),
                risk: parseFloat(fd.get('risk')),
                resultType: fd.get('resultType'),
                pnlValue: parseFloat(fd.get('pnlValue')),
                setup: fd.get('setup') || 'Standard'
            };

            state.trades.push(trade);
            saveState();
            renderApp();
            
            try {
                await fetch(state.syncUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'addTrade', ...trade })
                });
                toggleDrawer(false);
                e.target.reset();
            } catch(err) {}
            
            btn.textContent = "COMMIT TO LEDGER";
            btn.disabled = false;
        };

        function resetApp() {
            if(confirm("Purge local session and disconnect node?")) {
                localStorage.removeItem('neelx_pro_session');
                location.reload();
            }
        }

        function saveState() {
            localStorage.setItem('neelx_pro_session', JSON.stringify(state));
        }

        function updateSyncStatus(type, text) {
            const dot = document.getElementById('ui-sync-dot');
            const txt = document.getElementById('ui-sync-text');
            dot.className = type === 'active' ? 'dot-pulse' : (type === 'syncing' ? 'w-2 h-2 rounded-full bg-amber-500 animate-pulse' : 'w-2 h-2 rounded-full bg-rose-500');
            txt.textContent = text;
        }

        function renderApp() {
            const recentList = document.getElementById('ui-recent-list');
            const fullHistory = document.getElementById('ui-full-history');
            recentList.innerHTML = '';
            fullHistory.innerHTML = '';

            const sortedTrades = [...state.trades].sort((a,b) => b.id - a.id);
            let totalPnl = 0;
            let wins = 0;

            sortedTrades.forEach((t, i) => {
                const isProfit = t.resultType === 'Profit';
                const isBE = t.resultType === 'BE';
                const pnlClass = isBE ? 'text-slate-400' : (isProfit ? 'text-emerald-400' : 'text-rose-400');
                const sign = isBE ? '' : (isProfit ? '+' : '-');

                if(isProfit) { totalPnl += Number(t.pnlValue); wins++; }
                else if(!isBE) { totalPnl -= Number(t.pnlValue); }

                const itemHtml = `
                    <div class="glass-card p-5 space-y-4 trade-card">
                        <div class="flex justify-between items-start">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center border border-white/10 font-bold text-xs text-blue-400">
                                    ${t.pair.substring(0,2)}
                                </div>
                                <div class="space-y-0.5">
                                    <div class="flex items-center gap-2">
                                        <p class="font-bold text-sm leading-none">${t.pair}</p>
                                        <span class="text-[8px] px-1.5 py-0.5 rounded-md bg-blue-500/20 text-blue-400 font-black uppercase tracking-tighter">${t.bias}</span>
                                    </div>
                                    <p class="text-[9px] text-slate-500 font-mono">${t.timestamp}</p>
                                </div>
                            </div>
                            <div class="text-right space-y-0.5">
                                <p class="font-mono text-sm font-bold ${pnlClass}">${sign}$${Math.abs(t.pnlValue).toFixed(2)}</p>
                                <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Realized</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-2 pt-4 border-t border-white/5">
                            <div class="space-y-0.5">
                                <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Position</p>
                                <p class="text-[10px] font-mono font-bold text-slate-300">${t.lots || '0.00'}</p>
                            </div>
                            <div class="space-y-0.5 text-center">
                                <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">At Risk</p>
                                <p class="text-[10px] font-mono font-bold text-slate-300">$${t.risk || '0.00'}</p>
                            </div>
                            <div class="space-y-0.5 text-right">
                                <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Strategy</p>
                                <p class="text-[10px] font-bold text-blue-400 truncate">${t.setup || 'CORE'}</p>
                            </div>
                        </div>
                    </div>`;

                if(i < 5) recentList.insertAdjacentHTML('beforeend', itemHtml);
                fullHistory.insertAdjacentHTML('beforeend', itemHtml);
            });

            const balance = state.startingCapital + totalPnl;
            const wr = state.trades.length > 0 ? ((wins / state.trades.length) * 100).toFixed(0) : 0;

            document.getElementById('ui-balance').textContent = `$${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('ui-total-pnl').textContent = `${totalPnl >= 0 ? '+' : '-'}$${Math.abs(totalPnl).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('ui-total-pnl').className = `text-xl font-mono font-bold ${totalPnl >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;
            document.getElementById('ui-winrate').textContent = `${wr}%`;
            document.getElementById('capitalInput').value = state.startingCapital;
        }
    </script>
</body>
</html>
